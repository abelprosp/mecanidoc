# MecaniDoc — Nginx para www.mecanidoc.com
# Proxy → app Docker em 127.0.0.1:3000
#
# Instalar:
#   sudo cp deploy/nginx/mecanidoc.com.conf /etc/nginx/sites-available/mecanidoc.com
#   sudo ln -sf /etc/nginx/sites-available/mecanidoc.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d www.mecanidoc.com -d mecanidoc.com
#
# DNS (no registo do domínio):
#   A    @     → IP da VPS
#   A    www   → IP da VPS

# Apex → www (HTTP; o Certbot ajusta HTTPS depois)
server {
    listen 80;
    listen [::]:80;
    server_name mecanidoc.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 http://www.mecanidoc.com$request_uri;
    }
}

# Site principal
server {
    listen 80;
    listen [::]:80;
    server_name www.mecanidoc.com;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
